<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>forensictrain — learn digital forensics for CTF</title>
<style>
  :root{
    /* light, high-readability palette */
    --bg:#F7F8FA;            /* page */
    --panel:#FFFFFF;         /* cards */
    --panel2:#EEF1F5;        /* inset / code chips */
    --ink:#1B2230;           /* primary text */
    --ink2:#475067;          /* secondary text */
    --dim:#7A8295;           /* tertiary text */
    --line:#D9DEE7;          /* borders */
    --rail:#11203A;          /* sidebar (dark for contrast) */
    --rail-ink:#E7ECF4;
    --rail-dim:#9AA7BD;
    --accent:#1F6FEB;        /* primary accent (blue) */
    --accent-d:#1657c0;
    --green:#138A5A;         /* correct / success */
    --green-bg:#E4F6EC;
    --amber:#9A6400;         /* warnings / eyebrows */
    --amber-bg:#FBF1DA;
    --red:#C0392B;           /* errors */
    --red-bg:#FBE7E5;
    --term-bg:#0E1726;       /* simulated terminal stays dark (it's a terminal) */
    --term-ink:#E7ECF4;
    --mono:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  .frame{display:grid;grid-template-columns:260px 1fr;height:100vh;max-height:100vh}

  /* sidebar */
  .rail{background:var(--rail);color:var(--rail-ink);padding:18px 0;overflow-y:auto}
  .brand{padding:0 18px 16px;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:12px}
  .brand h1{font-size:17px;margin:0;letter-spacing:.3px;font-weight:800}
  .brand h1 .c{color:#6FB1FF}
  .brand .sub{color:var(--rail-dim);font-size:12px;margin-top:3px}
  .brand .back{display:inline-flex;align-items:center;gap:6px;margin-top:12px;color:var(--rail-dim);text-decoration:none;font-size:12px;font-weight:600;padding:5px 10px;border:1px solid rgba(255,255,255,.15);border-radius:7px;transition:.15s}
  .brand .back:hover{color:#6FB1FF;border-color:#6FB1FF}
  .path-list{padding:8px}
  .path-list .group{color:var(--rail-dim);font-size:11px;letter-spacing:1px;text-transform:uppercase;padding:12px 10px 5px;user-select:none}
  .stage-node{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:8px;position:relative;color:var(--rail-ink);cursor:default;font-size:14px}
  .stage-node.clickable{cursor:pointer}
  .stage-node.clickable:hover{background:rgba(255,255,255,.07)}
  .stage-node.active{background:rgba(111,177,255,.16)}
  .stage-node.active::before{content:"";position:absolute;left:0;top:7px;bottom:7px;width:3px;background:#6FB1FF;border-radius:2px}
  .stage-node.locked{opacity:.45}
  .stage-node .ic{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:rgba(255,255,255,.1);flex-shrink:0}
  .stage-node.done .ic{background:var(--green);color:#fff}
  .stage-node.active .ic{background:#6FB1FF;color:#0E1726}
  .stage-node .lbl{flex:1}
  .stage-node .mark{font-size:11px;color:var(--rail-dim)}
  .stage-node.done .mark{color:#7FE0AE}

  /* topbar */
  .main{display:flex;flex-direction:column;overflow:hidden}
  .topbar{display:flex;align-items:center;gap:20px;padding:14px 24px;border-bottom:1px solid var(--line);background:var(--panel)}
  .stat{display:flex;align-items:baseline;gap:6px}
  .stat b{font-size:17px;font-weight:800}
  .stat .lbl{color:var(--dim);font-size:12px}
  .stat.xp b{color:var(--accent)}
  .stat.streak b{color:var(--amber)}
  .topbar .spacer{flex:1}
  .progress-wrap{display:flex;align-items:center;gap:8px}
  .progress-track{height:8px;background:var(--panel2);border-radius:5px;width:160px;overflow:hidden}
  .progress-fill{height:100%;background:var(--green);width:0;transition:width .4s}
  .progress-label{font-size:12px;color:var(--dim)}
  .reset{background:none;border:1px solid var(--line);color:var(--dim);font-family:var(--sans);font-size:12px;padding:6px 12px;border-radius:7px;cursor:pointer}
  .reset:hover{border-color:var(--red);color:var(--red)}
  .menu-btn{display:none;background:none;border:1px solid var(--line);color:var(--ink);font-size:18px;padding:4px 11px;border-radius:7px;cursor:pointer}

  /* stage area */
  .stage{flex:1;overflow-y:auto;padding:30px 34px 90px}
  .stage-inner{max-width:760px;margin:0 auto}
  .eyebrow{color:var(--amber);font-size:12px;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;font-weight:700}
  h2.lesson{font-size:26px;margin:0 0 6px;letter-spacing:-.3px;font-weight:800}
  .lede{color:var(--ink2);font-size:16px;margin:6px 0 18px}
  p.body{color:var(--ink);margin:12px 0}
  p.body .k{color:var(--accent-d);font-weight:700}
  p.body .w{color:var(--amber);font-weight:700}
  code.inl{background:var(--panel2);border:1px solid var(--line);padding:1px 7px;border-radius:5px;color:var(--accent-d);font-family:var(--mono);font-size:.9em}

  /* "what this word means" beginner boxes */
  .define{background:var(--amber-bg);border:1px solid #EAD9AC;border-radius:10px;padding:14px 16px;margin:14px 0}
  .define h4{margin:0 0 6px;font-size:13px;color:var(--amber);letter-spacing:.5px;text-transform:uppercase}
  .define p{margin:7px 0;color:#5C4A1E;font-size:14px}
  .define p b{color:#3F3413}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin:16px 0}
  .card h3{margin:0 0 12px;font-size:15px;color:var(--ink);font-weight:800}
  .cmd-row{display:flex;gap:14px;padding:8px 0;border-bottom:1px solid var(--line)}
  .cmd-row:last-child{border-bottom:none}
  .cmd-row code{color:var(--accent-d);min-width:140px;flex-shrink:0;font-family:var(--mono);font-size:13px}
  .cmd-row span{color:var(--ink2)}

  /* challenge */
  .challenge{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:22px;margin:20px 0;box-shadow:0 1px 3px rgba(20,30,50,.04)}
  .qtag{color:var(--amber);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;font-weight:700}
  .q{font-size:16px;margin-bottom:18px;line-height:1.55;font-weight:600}
  .q b{color:var(--accent-d)}
  .opts{display:grid;gap:10px}
  .opt{text-align:left;background:var(--panel);border:1.5px solid var(--line);color:var(--ink);font-family:var(--sans);font-size:15px;padding:13px 16px;border-radius:9px;cursor:pointer;transition:.12s;display:flex;gap:10px;align-items:flex-start}
  .opt:hover:not(:disabled){border-color:var(--accent);background:#F0F6FF}
  .opt:disabled{cursor:default}
  .opt .pre{color:var(--dim);font-weight:700;flex-shrink:0}
  .opt.correct{border-color:var(--green);background:var(--green-bg)}
  .opt.correct .pre{color:var(--green)}
  .opt.wrong{border-color:var(--red);background:var(--red-bg)}
  .opt.wrong .pre{color:var(--red)}
  .opt .tag{margin-left:auto;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding-left:10px}
  .opt.correct .tag{color:var(--green)}
  .opt.wrong .tag{color:var(--red)}

  .verdict{margin-top:16px;font-size:14px;min-height:10px}
  .verdict.ok{color:var(--green)}
  .verdict.no{color:var(--red)}
  .verdict .explain{display:block;color:var(--ink2);margin-top:7px;line-height:1.6;font-weight:400}
  .verdict b.lead{font-weight:800}
  .ctrls{display:flex;gap:10px;margin-top:18px;align-items:center}
  .ctrls .spacer{flex:1}

  .btn{background:var(--accent);color:#fff;border:none;font-family:var(--sans);font-weight:700;font-size:14px;padding:11px 20px;border-radius:9px;cursor:pointer}
  .btn:hover{background:var(--accent-d)}
  .btn:disabled{opacity:.4;cursor:default;background:var(--accent)}
  .btn.ghost{background:none;border:1.5px solid var(--line);color:var(--ink2)}
  .btn.ghost:hover{border-color:var(--accent);color:var(--accent);background:#F0F6FF}
  .btn.green{background:var(--green)}
  .btn.green:hover{filter:brightness(.94)}

  /* fill input */
  .fillrow{display:flex;gap:10px;margin-bottom:6px;flex-wrap:wrap}
  .fillrow input{background:var(--panel);border:1.5px solid var(--line);color:var(--ink);font-family:var(--mono);font-size:16px;padding:11px 14px;border-radius:9px;width:230px;letter-spacing:.5px}
  .fillrow input:focus{outline:none;border-color:var(--accent)}

  /* simulated terminal */
  .term{background:var(--term-bg);border-radius:12px;overflow:hidden;margin:18px 0;border:1px solid #243349}
  .term-head{background:#15243C;padding:9px 14px;display:flex;align-items:center;gap:7px}
  .term-head i{width:11px;height:11px;border-radius:50%;display:block}
  .term-head i:nth-child(1){background:#FF5F56}.term-head i:nth-child(2){background:#FFBD2E}.term-head i:nth-child(3){background:#27C93F}
  .term-head .ttl{margin-left:10px;color:var(--rail-dim);font-size:12px;font-family:var(--mono)}
  .term-body{padding:14px 16px;min-height:120px;max-height:280px;overflow-y:auto;font-family:var(--mono);font-size:13px;line-height:1.65;color:var(--term-ink)}
  .term-line{white-space:pre-wrap;word-break:break-word}
  .term-line .ps{color:#6FE0A0}
  .term-line .ps .p{color:#6FB1FF}
  .term-line.out{color:#AEB9CC}
  .term-line.err{color:#FF8B7E}
  .term-line.ok{color:#6FE0A0}
  .term-input-row{display:flex;align-items:center;gap:7px;padding:0 16px 14px;font-family:var(--mono)}
  .term-input-row .ps{color:#6FE0A0;white-space:nowrap;font-size:13px}
  .term-input-row .ps .p{color:#6FB1FF}
  .term-input{flex:1;background:none;border:none;color:var(--term-ink);font-family:var(--mono);font-size:13px;outline:none;caret-color:#6FE0A0}
  .task-banner{display:flex;gap:12px;align-items:flex-start;background:#F0F6FF;border:1px solid #C9DDFB;border-left:4px solid var(--accent);border-radius:10px;padding:14px 16px;margin:16px 0}
  .task-banner .num{color:var(--accent);font-weight:800;font-family:var(--mono)}
  .task-banner .tx{flex:1}
  .task-banner .tx b{color:var(--accent-d)}
  .task-state{font-size:13px;color:var(--dim);margin:8px 0 0}
  .task-state .done{color:var(--green);font-weight:700}

  /* bit toggles */
  .bits{display:flex;gap:9px;flex-wrap:wrap;margin:16px 0}
  .bit{display:flex;flex-direction:column;align-items:center;gap:6px}
  .bit .b{width:48px;height:48px;border:1.5px solid var(--line);border-radius:9px;background:var(--panel);color:var(--dim);font-family:var(--mono);font-size:21px;font-weight:700;cursor:pointer;transition:.1s}
  .bit .b.on{background:#E8F0FE;border-color:var(--accent);color:var(--accent-d)}
  .bit .pw{font-size:10px;color:var(--dim);font-family:var(--mono)}
  .bit.sign .b.on{background:var(--red-bg);border-color:var(--red);color:var(--red)}
  .readout{font-size:16px;margin:10px 0 4px}
  .readout .v{color:var(--accent-d);font-size:20px;font-weight:800;font-family:var(--mono)}
  .readout .v.neg{color:var(--red)}

  /* memory tiles */
  .mem-cell{display:flex;align-items:center;gap:12px;margin-bottom:8px}
  .mem-cell .addr{color:var(--accent-d);font-size:13px;width:70px;font-family:var(--mono)}
  .mem-cell .slot{width:66px;height:44px;border:1.5px dashed var(--line);border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:16px;background:var(--panel);font-family:var(--mono);font-weight:700}
  .mem-cell .slot.filled{border-style:solid;border-color:var(--green);color:var(--green);background:var(--green-bg)}
  .tiles{display:flex;gap:11px;margin:8px 0 4px}
  .tile{width:66px;height:44px;border:1.5px solid var(--amber);border-radius:9px;background:var(--amber-bg);color:var(--amber);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;font-family:var(--mono);font-weight:700}
  .tile.placed{opacity:.3;cursor:default}
  .tile.sel{outline:3px solid rgba(31,111,235,.4)}
  .hint{color:var(--dim);font-size:13px}

  /* section summary */
  .summary{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:22px;margin:22px 0}
  .summary h3{margin:0 0 4px;font-size:17px;font-weight:800;color:var(--green)}
  .summary .sub{color:var(--dim);font-size:13px;margin:0 0 16px}
  .summary-item{padding:12px 0;border-bottom:1px solid var(--line)}
  .summary-item:last-child{border-bottom:none}
  .summary-item .sq{font-weight:700;color:var(--ink);font-size:14px;margin-bottom:4px}
  .summary-item .sa{color:var(--green);font-size:14px;font-weight:700}
  .summary-item .se{color:var(--ink2);font-size:13px;margin-top:3px}

  .gate{background:linear-gradient(180deg,#F0F6FF,#FFFFFF);border:1px solid #C9DDFB;border-radius:14px;padding:28px 24px;margin:24px 0;text-align:center}
  .gate .big{font-size:20px;color:var(--ink);margin:0 0 6px;font-weight:800}
  .gate .earned{color:var(--accent-d);font-size:14px;margin-bottom:8px;font-weight:700}
  .gate .sm{color:var(--ink2);font-size:14px;margin:0 0 20px}

  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;padding:12px 22px;border-radius:10px;font-size:14px;font-weight:700;opacity:0;transition:.3s;pointer-events:none;z-index:50;box-shadow:0 6px 20px rgba(20,30,50,.2)}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
  .toast.green{background:var(--green)}

  .footnote{color:var(--dim);font-size:12px;margin-top:30px;border-top:1px solid var(--line);padding-top:14px;line-height:1.6}

  @media (max-width:760px){
    .frame{grid-template-columns:1fr}
    .rail{position:fixed;z-index:40;width:260px;height:100vh;transform:translateX(-100%);transition:.25s}
    .rail.open{transform:none}
    .menu-btn{display:inline-flex!important}
    .stage{padding:22px 16px 90px}
    .progress-track{width:90px}
    h2.lesson{font-size:22px}
  }
</style>
</head>
<body>
<div class="frame">
  <aside class="rail" id="rail">
    <div class="brand">
      <h1>Digital <span class="c">Forensics</span></h1>
      <div class="sub">Investigate files, disks, and network traffic</div>
      <a class="back" href="index.html">&larr; All topics</a>
    </div>
    <nav class="path-list" id="pathList"></nav>
  </aside>
  <div class="main">
    <div class="topbar">
      <button class="menu-btn" onclick="document.getElementById('rail').classList.toggle('open')">&#8801;</button>
      <div class="stat xp"><b id="xp">0</b><span class="lbl">XP</span></div>
      <div class="stat streak"><b id="streak">0</b><span class="lbl">streak</span></div>
      <div class="spacer"></div>
      <div class="progress-wrap"><div class="progress-track"><div class="progress-fill" id="pfill"></div></div><span class="progress-label" id="plabel">0 / 5</span></div>
      <button class="reset" onclick="resetAll()">restart</button>
    </div>
    <div class="stage"><div class="stage-inner" id="stage"></div></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const STAGES=[
  {id:"fsbasics",icon:"\u2630",label:"what is forensics?",group:"fundamentals"},
  {id:"deleted",icon:"\u2298",label:"deleted \u2260 gone",group:"fundamentals"},
  {id:"searching",icon:">_",label:"searching for evidence",group:"finding evidence"},
  {id:"disklayers",icon:"\u25a4",label:"disk image layers",group:"disk & network"},
  {id:"packets",icon:"\u2194",label:"packet analysis",group:"disk & network"},
  {id:"forensicshints",icon:"\u2691",label:"challenge hints",group:"reference",type:"reference"},
  {id:"forensicstools",icon:"\u2630",label:"tools reference",group:"reference",type:"reference"},
];
let state,currentIdx;
function freshState(){const done={};STAGES.forEach(s=>done[s.id]=false);return{xp:0,streak:0,done,unlockedTo:0};}

/* ---------- progress saving (localStorage; silently no-ops if unavailable) ---------- */
const SAVE_KEY="forensictrain_progress_v1";
const MCQ_SAVED={}; // {stageId:[bool,...]} mirror of solved arrays, survives reloads
function storageOK(){try{const k="__ft_test__";localStorage.setItem(k,"1");localStorage.removeItem(k);return true;}catch(e){return false;}}
const CAN_SAVE=storageOK();
function saveProgress(){
  if(!CAN_SAVE)return;
  try{
    const blob={
      v:1,
      xp:state.xp, streak:state.streak, done:state.done, unlockedTo:state.unlockedTo,
      mcq:MCQ_SAVED,
      search:{taskIdx:SEARCHSTATE.taskIdx, completed:SEARCHSTATE.completed, cwd:SEARCHSTATE.cwd}
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(blob));
  }catch(e){/* ignore quota or serialization errors */}
}
function loadProgress(){
  if(!CAN_SAVE)return false;
  try{
    const raw=localStorage.getItem(SAVE_KEY); if(!raw)return false;
    const b=JSON.parse(raw); if(!b||b.v!==1)return false;
    state.xp=b.xp||0; state.streak=b.streak||0;
    if(b.done)STAGES.forEach(s=>{state.done[s.id]=!!b.done[s.id];});
    state.unlockedTo=typeof b.unlockedTo==="number"?b.unlockedTo:0;
    if(b.mcq)Object.keys(b.mcq).forEach(k=>{MCQ_SAVED[k]=b.mcq[k];});
    if(b.search){SEARCHSTATE.cwd=b.search.cwd||"~";if(Array.isArray(b.search.completed)&&b.search.completed.length===SEARCH_TASKS.length){SEARCHSTATE.completed=b.search.completed.slice();SEARCHSTATE.taskIdx=Math.min(b.search.taskIdx||0,SEARCH_TASKS.length);}else{SEARCHSTATE.taskIdx=0;}}
    return true;
  }catch(e){return false;}
}
function clearSaved(){if(!CAN_SAVE)return;try{localStorage.removeItem(SAVE_KEY);}catch(e){}}

function boot(){
  state=freshState();currentIdx=0;
  // clear all in-session stage progress
  for(const k in MCQ_STATE)delete MCQ_STATE[k];
  for(const k in MCQ_SAVED)delete MCQ_SAVED[k];
  SEARCHSTATE.taskIdx=0;SEARCHSTATE.cwd="~";SEARCHSTATE.completed=new Array(SEARCH_TASKS.length).fill(false);
  loadProgress();           // restore saved progress if present
  renderPath();updateStats();renderStage();
}
function resetAll(){clearSaved();boot();toast("path restarted",true);}
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function toBin(n,bits){return(n>>>0).toString(2).padStart(bits,"0").slice(-bits);}
function toast(msg,green){const t=document.getElementById("toast");t.textContent=msg;t.className="toast show"+(green?" green":"");clearTimeout(t._t);t._t=setTimeout(()=>t.className="toast",1700);}
function award(pts){state.xp+=pts;state.streak++;let b=state.streak%5===0?" \u00b7 "+state.streak+" streak!":"";toast("+"+pts+" XP"+b,true);updateStats();}
function miss(){state.streak=0;updateStats();}
function updateStats(){document.getElementById("xp").textContent=state.xp;document.getElementById("streak").textContent=state.streak;const graded=STAGES.filter(s=>s.type!=="reference");const total=graded.length,d=graded.filter(s=>state.done[s.id]).length;document.getElementById("pfill").style.width=(d/total*100)+"%";document.getElementById("plabel").textContent=d+" / "+total;saveProgress();}
function renderPath(){
  const el=document.getElementById("pathList");el.innerHTML="";let lastGroup=null;
  STAGES.forEach((s,i)=>{
    if(s.group!==lastGroup){const g=document.createElement("div");g.className="group";g.textContent=s.group;el.appendChild(g);lastGroup=s.group;}
    const isRef=s.type==="reference";
    const unlocked=isRef||i<=state.unlockedTo;
    const done=!isRef&&state.done[s.id];
    const node=document.createElement("div");
    node.className="stage-node"+(i===currentIdx?" active":"")+(done?" done":"")+(unlocked?" clickable":" locked");
    node.innerHTML='<span class="ic">'+(done?"\u2713":(unlocked?s.icon:"\ud83d\udd12"))+'</span><span class="lbl">'+s.label+'</span><span class="mark">'+(done?"done":(isRef?"reference":""))+'</span>';
    if(unlocked)node.onclick=()=>{currentIdx=i;renderPath();renderStage();document.getElementById('rail').classList.remove('open');};
    el.appendChild(node);
  });
}
function renderStage(){const s=document.getElementById("stage");const stage=STAGES[currentIdx];s.innerHTML=LESSONS[stage.id]();if(INIT[stage.id])INIT[stage.id]();s.parentElement.scrollTop=0;}
const FOOT='<div class="footnote">Sources: the uploaded <i>Book 4 \u2014 Forensics</i> PDF (Luke Jones) and the <i>CTF Primer</i> (Luke Jones, Forensics chapter) \u2014 covering file systems, deleted-data recovery, file carving, disk-image layers (The Sleuth Kit), and packet/network analysis layers. Beginner explanations, worked examples, and the search-tools drill go beyond the source material to avoid assuming prior knowledge. Specific external-challenge data (flags, exact disk images, and step-by-step challenge solutions) has been deliberately excluded.</div>';

function completeStage(bonusNote, summaryHTML, silent){
  const stage=STAGES[currentIdx];
  if(!state.done[stage.id]){state.done[stage.id]=true;if(currentIdx+1>state.unlockedTo)state.unlockedTo=currentIdx+1;}
  renderPath();updateStats();
  const host=document.getElementById("stage");
  if(summaryHTML){const wrap=document.createElement("div");wrap.innerHTML=summaryHTML;host.appendChild(wrap);}
  const isLast=currentIdx===STAGES.length-1;
  const noteText=silent?"You\u2019ve already completed this section \u2014 here\u2019s the review again.":(bonusNote||"");
  const redoBtn='<button class="btn ghost" id="redoBtn">\u21ba redo this section</button>';
  const gate=document.createElement("div");gate.className="gate";
  gate.innerHTML=isLast
    ?'<p class="big">\ud83c\udf89 Path complete</p><p class="earned">Total XP: '+state.xp+'</p><p class="sm">You\u2019ve finished every section.</p><div class="ctrls" style="justify-content:center">'+redoBtn+'<button class="btn ghost" onclick="boot()">start over</button></div>'
    :'<p class="big">Section complete: '+stage.label+'</p><p class="earned">'+noteText+'</p><p class="sm">Next up: '+STAGES[currentIdx+1].label+'</p><div class="ctrls" style="justify-content:center">'+redoBtn+'<button class="btn" id="continueBtn">continue \u2192</button></div>';
  host.appendChild(gate);
  gate.scrollIntoView({behavior:"smooth",block:"center"});
  const cont=document.getElementById("continueBtn");
  if(cont)cont.onclick=()=>{currentIdx++;renderPath();renderStage();};
  const redo=document.getElementById("redoBtn");
  if(redo)redo.onclick=()=>redoStage(stage.id);
}

/* Replay a single section from scratch, keeping all later sections unlocked. */
function redoStage(stageId){
  // mark not-done so the progress bar reflects it; leave unlockedTo untouched
  state.done[stageId]=false;
  // reset the relevant per-stage progress
  if(MCQ_STATE[stageId]){delete MCQ_STATE[stageId];}
  if(MCQ_SAVED[stageId]){delete MCQ_SAVED[stageId];}
  if(stageId==="searching"){SEARCHSTATE.taskIdx=0;SEARCHSTATE.cwd="~";SEARCHSTATE.completed=new Array(SEARCH_TASKS.length).fill(false);}
  renderPath();updateStats();renderStage();
  toast("section reset \u2014 have another go",true);
}

/* ---------- MCQ engine: keep wrong + highlight correct + manual Next ---------- */
const MCQ_STATE={};
function mcqStage(id,intro,questions){
  // initialize once; preserve progress if the user navigates away and back
  if(!MCQ_STATE[id]){
    const saved=Array.isArray(MCQ_SAVED[id])&&MCQ_SAVED[id].length===questions.length?MCQ_SAVED[id].slice():new Array(questions.length).fill(false);
    MCQ_STATE[id]={questions,idx:0,solved:saved,answered:saved.slice()};
  }
  else{MCQ_STATE[id].questions=questions;} // keep solved/idx, refresh question refs
  return intro+'<div id="mcq-'+id+'"></div>'+FOOT;
}
function mountMCQ(id){
  const st=MCQ_STATE[id];
  // if this section was already finished, show the review again instead of restarting
  if(st.solved.every(Boolean)){ finishMCQ(id,true); return; }
  // resume at the first unsolved question
  if(st.solved[st.idx]){ for(let j=0;j<st.questions.length;j++){ if(!st.solved[j]){st.idx=j;break;} } }
  renderMCQItem(id);
}
function renderMCQItem(id){
  const st=MCQ_STATE[id];const host=document.getElementById("mcq-"+id);const i=st.idx;const q=st.questions[i];const letters=["A","B","C","D","E"];const solvedCount=st.solved.filter(Boolean).length;
  host.innerHTML='<div class="challenge"><div class="qtag">Question '+(i+1)+' of '+st.questions.length+' \u00b7 '+solvedCount+' answered</div><div class="q">'+q.q+'</div><div class="opts" id="opts-'+id+'">'+q.opts.map((o,k)=>'<button class="opt" data-k="'+k+'"><span class="pre">'+letters[k]+'</span><span>'+o+'</span></button>').join("")+'</div><div class="verdict" id="v-'+id+'"></div><div class="ctrls"><div class="spacer"></div><button class="btn" id="next-'+id+'" disabled>next \u2192</button></div></div>';
  const v=document.getElementById("v-"+id);
  const nextBtn=document.getElementById("next-"+id);
  host.querySelectorAll(".opt").forEach(btn=>{
    btn.onclick=()=>{
      const k=+btn.dataset.k;
      // lock all, mark correct + chosen-wrong; do NOT auto-advance
      host.querySelectorAll(".opt").forEach((b,idx)=>{
        b.disabled=true;
        if(idx===q.a){b.classList.add("correct");b.querySelector(".tag")||b.insertAdjacentHTML("beforeend",'<span class="tag">correct</span>');}
        if(idx===k&&k!==q.a){b.classList.add("wrong");b.insertAdjacentHTML("beforeend",'<span class="tag">your pick</span>');}
      });
      if(k===q.a){
        v.className="verdict ok";v.innerHTML='<b class="lead">Correct.</b><span class="explain">'+q.ex+'</span>';
        if(!st.solved[i]){st.solved[i]=true;MCQ_SAVED[id]=st.solved.slice();award(10);}
      }else{
        v.className="verdict no";v.innerHTML='<b class="lead">Not quite \u2014 the right answer is highlighted above.</b><span class="explain">'+q.ex+'</span>';
        miss();
      }
      st.answered[i]=true;
      nextBtn.disabled=false;
      nextBtn.focus();
    };
  });
  nextBtn.onclick=()=>advanceMCQ(id);
}
function advanceMCQ(id){
  const st=MCQ_STATE[id];
  // all questions must be answered correctly to finish; revisit unsolved ones
  if(st.solved.every(Boolean)){ finishMCQ(id); return; }
  const n=st.questions.length;
  // prefer next unsolved after current
  let found=-1;
  for(let step=1;step<=n;step++){let j=(st.idx+step)%n;if(!st.solved[j]){found=j;break;}}
  st.idx=found<0?st.idx:found;
  renderMCQItem(id);
}
function finishMCQ(id,silent){
  const st=MCQ_STATE[id];
  const items=st.questions.map((q,n)=>{
    const correctText=q.opts[q.a];
    return '<div class="summary-item"><div class="sq">'+(n+1)+'. '+stripTags(q.q)+'</div><div class="sa">\u2713 '+correctText+'</div><div class="se">'+q.ex+'</div></div>';
  }).join("");
  const summary='<div class="summary"><h3>Section review</h3><p class="sub">The correct answer to each question, for reference.</p>'+items+'</div>';
  completeStage("All "+st.questions.length+" questions answered correctly. +"+(st.questions.length*10)+" XP.", summary, silent);
}
function stripTags(s){return s.replace(/<[^>]+>/g,"");}

const LESSONS={},INIT={};
/* ===================== STAGE 1 — WHAT IS DIGITAL FORENSICS? ===================== */
LESSONS.fsbasics=()=>mcqStage("fsbasics",
'<div class="eyebrow">Stage 1 \u00b7 fundamentals</div><h2 class="lesson">What is digital forensics?</h2>'
+'<p class="lede">Digital forensics is about reconstructing what happened on a computer after the fact \u2014 and it starts with understanding how computers keep track of files.</p>'
+'<p class="body">In cybersecurity, \u201cDigital Forensics\u201d is usually just called \u201cForensics\u201d for short. It\u2019s the field that gathers and examines evidence after some kind of incident \u2014 which could be a crime \u2014 to figure out what happened. This isn\u2019t only useful for law enforcement; it also helps organizations understand how an attack succeeded so they can prevent the next one. Digital forensics focuses on evidence stored electronically on computer devices, though forensic science as a whole covers much more than just computers.</p>'
+'<p class="body">Before you can investigate evidence on a computer, it helps to understand how a computer organizes its files in the first place. A <span class="k">file system</span> is like an index for every file stored on a device \u2014 it\u2019s how the computer knows what exists and where to find it.</p>'
+'<div class="define"><h4>File system</h4><p>The system a computer uses to organize, name, and keep track of all its files and folders, so it can find them again later.</p></div>'
+'<p class="body">A file system has a few key building blocks:</p>'
+'<div class="card"><h3>File system building blocks</h3>'
+'<div class="cmd-row"><code>Files</code><span>store the actual data. Every file has a <i>filename</i> (what you call it) and a <i>type</i> (what kind of data it holds, e.g. text, image)</span></div>'
+'<div class="cmd-row"><code>Directories</code><span>(folders) \u2014 collections of files grouped together</span></div>'
+'<div class="cmd-row"><code>Metadata</code><span>data <i>about</i> a file, rather than its contents: things like its size, when it was created, and who created it</span></div></div>'
+'<p class="body">Here\u2019s a useful way to think about a filename: it\u2019s like the address of a friend\u2019s house. The address itself has nothing to do with the house \u2014 it\u2019s just an agreed-upon way to remember where to find it. If you forget the address, the house doesn\u2019t disappear. The same idea applies to files, which becomes important in the next stage when we look at what \u201cdeleting\u201d a file actually does.</p>'
+'<p class="body">Internally, a file is made up of <span class="k">blocks</span> \u2014 the smallest pieces of data stored in memory. A file has a <i>header block</i>, marking where it starts, and a <i>footer block</i>, marking where it ends.</p>',
[
  {q:"In file-system terms, what is \u201cmetadata\u201d?",opts:["A backup copy of the file","Data about a file, like its size or creation date \u2014 not the file\u2019s actual contents","The password protecting a file"],a:1,ex:"Metadata describes the file (size, timestamps, etc.) without being the file\u2019s actual content. The content itself is stored separately in the file\u2019s data blocks."},
  {q:"Why is comparing a filename to a house address a useful way to think about file systems?",opts:["Because filenames must be exactly the same length as the data they point to","Because only one filename can exist per computer","Because the filename is just a reference to where the data is stored, not the data itself"],a:2,ex:"A filename is a pointer/reference to data stored somewhere in memory, just like an address points to a house. The reference and the thing it refers to are two separate concepts."},
  {q:"What do a file\u2019s header block and footer block mark?",opts:["The owner and the permissions of the file","The start and end points of the file\u2019s data","The file\u2019s author and its file type"],a:1,ex:"The header block marks where a file\u2019s data begins, and the footer block marks where it ends. Blocks are the smallest units of stored data the file system works with."}
]);
INIT.fsbasics=()=>mountMCQ("fsbasics");

/* ===================== STAGE 2 — DELETED DOESN'T MEAN GONE ===================== */
LESSONS.deleted=()=>mcqStage("deleted",
'<div class="eyebrow">Stage 2 \u00b7 fundamentals</div><h2 class="lesson">Deleted doesn\u2019t mean gone</h2>'
+'<p class="lede">When you delete a file, the computer usually just forgets where it is \u2014 the data itself can still be sitting there, recoverable.</p>'
+'<p class="body">This is one of the most important ideas in forensics: deleting a file does <b>not</b> normally erase its data. Going back to the address analogy \u2014 if you forget your friend\u2019s address, the house doesn\u2019t get demolished. It\u2019s still standing; you\u2019ve just lost the reference to find it. Files work the same way.</p>'
+'<p class="body">When you delete a file, what typically happens is:</p>'
+'<div class="card"><h3>What actually happens when you \u201cdelete\u201d a file</h3>'
+'<div class="cmd-row"><code>1</code><span>The <b>reference</b> to the data (the filename/pointer) is removed</span></div>'
+'<div class="cmd-row"><code>2</code><span>The disk space the file occupied gets marked as <b>unallocated</b> \u2014 meaning the computer considers it free to use again</span></div>'
+'<div class="cmd-row"><code>3</code><span>The actual data usually <b>stays exactly where it was</b> until something else happens to be written over that same spot</span></div></div>'
+'<div class="define"><h4>Unallocated space</h4><p>Disk space that the file system considers \u201cfree\u201d and available to write new data into \u2014 even though old data may still physically be sitting there until it\u2019s overwritten.</p></div>'
+'<p class="body">This is exactly why forensic investigators can often recover deleted files: if nothing has overwritten that disk space yet, the data is still intact, even though the normal file system no longer has any reference to it. The challenge is finding data that the file system itself has \u201cforgotten\u201d about.</p>'
+'<p class="body">This leads to a specific forensic technique called <span class="k">file carving</span>.</p>'
+'<div class="define"><h4>File carving</h4><p>A technique for extracting files directly from raw disk data, without relying on the file system\u2019s normal references (filenames, directory listings) to locate them. It\u2019s commonly used to recover deleted files, since the file system may have already forgotten about them even though the data is still there.</p></div>'
+'<p class="body">File carving works by recognizing the structure of file data itself \u2014 for example, many file types have recognizable header and footer patterns \u2014 rather than asking the file system \u201cwhere is this file?\u201d This is recognition-level knowledge for this trainer: you don\u2019t need to perform file carving yourself here, just understand what it is and why it\u2019s useful to an investigator.</p>',
[
  {q:"When a file is deleted, what usually happens to its underlying data?",opts:["It is automatically moved to a separate \u201cdeleted files\u201d partition","It is immediately and permanently erased","It typically remains in place until something else overwrites that disk space"],a:2,ex:"Deleting a file generally removes the reference to the data and marks the space as unallocated (free to reuse) \u2014 but the data itself often physically remains until overwritten."},
  {q:"What does \u201cunallocated\u201d mean in the context of disk space?",opts:["Space that is physically damaged and unusable","Space reserved exclusively for the operating system","Space the file system considers free to write new data into, even if old data is still there"],a:2,ex:"Unallocated just means \u201cnot currently claimed by a file\u201d from the file system\u2019s point of view \u2014 it doesn\u2019t mean the space is empty."},
  {q:"What is file carving?",opts:["Extracting files from raw disk data without relying on the file system\u2019s normal references","Compressing a file to save disk space","Permanently deleting a file beyond recovery"],a:0,ex:"File carving recovers data by recognizing patterns in the raw data itself (like file headers/footers), bypassing the file system\u2019s own bookkeeping \u2014 useful when that bookkeeping has been lost, such as after deletion."}
]);
INIT.deleted=()=>mountMCQ("deleted");

/* ===================== STAGE 3 — SEARCHING FOR EVIDENCE IN FILES (simulated terminal) ===================== */
LESSONS.searching=()=>
'<div class="eyebrow">Stage 3 \u00b7 finding evidence</div><h2 class="lesson">Searching for evidence in files</h2>'
+'<p class="lede">Forensic investigators often have to figure out what a mystery file actually is, then search through it (or a whole directory tree) for something specific.</p>'
+'<p class="body">You already know how to look around a file system with commands like <code class="inl">cd</code>, <code class="inl">ls</code>, and <code class="inl">cat</code>. Forensics adds a few more tools on top of those, suited to a common situation: someone hands you a file (or a folder full of them) and you don\u2019t yet know what\u2019s inside, or where the thing you\u2019re looking for is hiding.</p>'
+'<div class="define"><h4>Reflex check</h4><p>Whenever you\u2019re handed an unfamiliar file in an investigation, the first reflex move is to ask \u201cwhat kind of file is this?\u201d before doing anything else \u2014 guessing based on the filename alone can be misleading.</p></div>'
+'<p class="body">The <code class="inl">file</code> command answers exactly that question: it inspects a file\u2019s actual content (not just its name) and tells you what type of data it holds.</p>'
+'<div class="card"><h3>New tools for investigating files</h3>'
+'<div class="cmd-row"><code>file NAME</code><span>inspects a file\u2019s contents and reports what type of data it actually is (e.g. plain text, image, compressed archive) \u2014 regardless of what the filename suggests</span></div>'
+'<div class="cmd-row"><code>grep \'PATTERN\' NAME</code><span>(or <code class="inl">egrep</code>) searches through a file\u2019s content for lines matching a pattern, instead of you having to read the whole thing yourself</span></div>'
+'<div class="cmd-row"><code>find . -name NAME</code><span>searches an entire directory tree (starting from the current folder, <code class="inl">.</code>) for a file or folder with a given name, including inside subfolders you haven\u2019t looked in yet</span></div></div>'
+'<p class="body">A \u201cpattern\u201d here just means the specific text you\u2019re looking for. In its simplest form, a pattern can just be a plain word or phrase \u2014 for example, <code class="inl">grep \'password\' notes.txt</code> finds every line in <code class="inl">notes.txt</code> that contains the word \u201cpassword\u201d, and <code class="inl">grep \'error\' log.txt</code> finds every line mentioning \u201cerror\u201d in <code class="inl">log.txt</code>. Patterns can get more sophisticated (using special symbols to match things like \u201cany digit\u201d or \u201cany number of letters\u201d), but as a beginner it\u2019s enough to know that a plain word or phrase is already a valid pattern to search for.</p>'
+'<p class="body">A quick tip: when typing out file or folder names, press <b>Tab</b> to auto-complete them. If there are multiple files that start the same way, the shell won\u2019t be able to guess which one you mean \u2014 press Tab twice to see the full list of possibilities.</p>'
+'<div class="task-banner"><span class="num" id="searchTaskNum">01</span><div class="tx" id="searchTaskText"></div></div>'
+'<div class="task-state" id="searchTaskState"></div>'
+'<div class="term"><div class="term-head"><i></i><i></i><i></i><span class="ttl">investigation shell</span></div>'
+'<div class="term-body" id="searchBody"></div>'
+'<div class="term-input-row"><span class="ps"><span class="p">you</span>:<span class="p" id="searchCwd">~</span>$</span>'
+'<input class="term-input" id="searchInput" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="type a command, then press Enter"></div></div>'
+FOOT;

const SEARCH_TASKS=[
  {group:"Identifying files",text:"You\u2019ve been given a mystery file called <b>mystery</b>. Find out what type of file it actually is.",hint:"use the <code class=\"inl\">file</code> command followed by the filename: type <b>file mystery</b>",valid:c=>/^file\s+mystery$/.test(c),run:()=>({out:"mystery: ASCII text, with very long lines"})},
  {group:"Identifying files",text:"The output told you it\u2019s plain text. Now look at its actual contents.",hint:"you already know this one: type <b>cat mystery</b>",valid:c=>/^cat\s+mystery$/.test(c),run:()=>({out:"xQ3f... (a long line of unreadable-looking text) ...Lp9"})},
  {group:"Searching content",text:"The file is full of gibberish, but you suspect the word <b>evidence</b> appears somewhere in it. Search for it.",hint:"use grep with the pattern in quotes, then the filename: type <b>grep 'evidence' mystery</b>",valid:c=>/^e?grep\s+'evidence'\s+mystery$/.test(c),run:()=>({out:"...the line containing the word evidence is shown here..."})},
  {group:"Searching the directory tree",text:"Somewhere inside the current folder (and its subfolders) there\u2019s a file called <b>report.txt</b>, but you don\u2019t know which subfolder it\u2019s in. Find it.",hint:"start at the current directory with <code class=\"inl\">.</code>, then specify the name: type <b>find . -name report.txt</b>",valid:c=>/^find\s+\.\s+-name\s+report\.txt$/.test(c),run:()=>({out:"./case_files/2024/report.txt"})},
  {group:"Searching the directory tree",text:"Move into the directory containing <b>report.txt</b>.",hint:"use <code class=\"inl\">cd</code> with the path you just found: type <b>cd case_files/2024</b>",valid:c=>/^cd\s+case_files\/2024\/?$/.test(c),run:()=>({cwd:"~/case_files/2024"})},
  {group:"Searching the directory tree",text:"Now view the contents of <b>report.txt</b>.",hint:"type <b>cat report.txt</b>",valid:c=>/^cat\s+report\.txt$/.test(c),run:()=>({out:"case notes: subject accessed the file at 14:02..."})},
];

const SEARCHSTATE={taskIdx:0,cwd:"~",completed:new Array(SEARCH_TASKS.length).fill(false)};
INIT.searching=()=>{
  const body=document.getElementById("searchBody");const input=document.getElementById("searchInput");const cwdEl=document.getElementById("searchCwd");
  cwdEl.textContent=SEARCHSTATE.cwd;
  function showTask(){const t=SEARCH_TASKS[SEARCHSTATE.taskIdx];document.getElementById("searchTaskNum").textContent=String(SEARCHSTATE.taskIdx+1).padStart(2,"0");document.getElementById("searchTaskText").innerHTML='<b>Task '+(SEARCHSTATE.taskIdx+1)+' of '+SEARCH_TASKS.length+' \u00b7 '+t.group+':</b> '+t.text;document.getElementById("searchTaskState").innerHTML='<span class="done">'+SEARCHSTATE.completed.filter(Boolean).length+'</span> of '+SEARCH_TASKS.length+' tasks done';}
  function emit(html,cls){const d=document.createElement("div");d.className="term-line"+(cls?(" "+cls):"");d.innerHTML=html;body.appendChild(d);body.scrollTop=body.scrollHeight;}
  function emitCmd(cmd){emit('<span class="ps"><span class="p">you</span>:<span class="p">'+SEARCHSTATE.cwd+'</span>$</span> '+escapeHtml(cmd));}
  function escapeHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
  function announceGroupIfNew(){
    const g=SEARCH_TASKS[SEARCHSTATE.taskIdx].group;
    const prev=SEARCHSTATE.taskIdx>0?SEARCH_TASKS[SEARCHSTATE.taskIdx-1].group:null;
    if(g!==prev){
      if(prev!==null){emit("\u2014\u2014 checkpoint: \u201c"+prev+"\u201d group done. Next group: \u201c"+g+"\u201d \u2014\u2014","ok");}
      emit("\u25b8 "+g.toUpperCase(),"out");
    }
  }
  function normalizeOutsideQuotes(s){
    s=s.trim();
    let out="",inQ=false;
    for(let i=0;i<s.length;i++){
      const ch=s[i];
      if(ch==='"'||ch==="'"){out+=ch;continue;}
      if(ch===" "){ if(out.endsWith(" "))continue; out+=" "; continue; }
      out+=ch;
    }
    return out;
  }
  function buildFinalSummary(){
    const refs=[
      ["file NAME","identify what kind of file something actually is"],
      ["grep 'PATTERN' NAME (or egrep)","search a file\u2019s content for a pattern"],
      ["find . -name NAME","search the whole directory tree for a file by name"],
      ["cd / cat","navigate to and view a file once you\u2019ve found it"]
    ];
    return '<div class="summary"><h3>Commands you practised</h3><p class="sub">Reference for everything in this drill.</p>'
      +refs.map(r=>'<div class="summary-item"><div class="sa"><code style="font-family:var(--mono)">'+r[0]+'</code> &mdash; '+r[1]+'</div></div>').join("")
      +'</div>';
  }
  function handle(raw){
    const cmd=normalizeOutsideQuotes(raw);if(cmd==="")return;emitCmd(cmd);
    if(cmd==="clear"){body.innerHTML="";return;}
    const t=SEARCH_TASKS[SEARCHSTATE.taskIdx];
    if(t.valid(cmd)){
      const eff=t.run()||{};
      if(eff.out)emit(eff.out,"out");
      if(eff.ok)emit(eff.ok,"ok");
      if(eff.cwd){SEARCHSTATE.cwd=eff.cwd;cwdEl.textContent=SEARCHSTATE.cwd;}
      if(!SEARCHSTATE.completed[SEARCHSTATE.taskIdx]){SEARCHSTATE.completed[SEARCHSTATE.taskIdx]=true;award(15);}
      emit("\u2713 task complete","ok");
      SEARCHSTATE.taskIdx++;
      if(SEARCHSTATE.taskIdx>=SEARCH_TASKS.length){
        input.disabled=true;
        completeStage(SEARCH_TASKS.length+" commands typed correctly. +"+(SEARCH_TASKS.length*15)+" XP.",buildFinalSummary());
        return;
      }
      announceGroupIfNew();
      showTask();
    } else {
      emit("hint: "+t.hint,"err");
      miss();
    }
  }
  input.addEventListener("keydown",e=>{if(e.key==="Enter"){handle(input.value);input.value="";}});
  // already finished? show the review again instead of restarting
  if(SEARCHSTATE.taskIdx>=SEARCH_TASKS.length){
    input.disabled=true;
    emit("You\u2019ve already completed this drill. Review below.","out");
    completeStage(SEARCH_TASKS.length+" commands typed correctly.",buildFinalSummary(),true);
    return;
  }
  if(SEARCHSTATE.taskIdx>0){
    emit("Welcome back \u2014 resuming where you left off ("+SEARCHSTATE.completed.filter(Boolean).length+" of "+SEARCH_TASKS.length+" tasks already done).","out");
  } else {
    emit("Investigation shell ready. Do the tasks in order. Type 'clear' to wipe the screen.","out");
  }
  emit("\u25b8 "+SEARCH_TASKS[SEARCHSTATE.taskIdx].group.toUpperCase(),"out");
  showTask();input.focus();
};

/* ===================== STAGE 4 — INSIDE A DISK IMAGE: FOUR LAYERS ===================== */
LESSONS.disklayers=()=>mcqStage("disklayers",
'<div class="eyebrow">Stage 4 \u00b7 disk & network</div><h2 class="lesson">Inside a disk image: four layers</h2>'
+'<p class="lede">Forensic disk analysis tools work in layers, each one revealing a different level of detail about how data is organized on a disk.</p>'
+'<p class="body">Before going further, it helps to be clear on what a \u201cdisk\u201d actually is. A disk is the physical storage inside a computer where data is permanently kept \u2014 files, programs, the operating system itself \u2014 even when the computer is turned off. (You might also hear it called a hard drive or storage drive.) This is different from memory (RAM), which only holds data temporarily while a program is running.</p>'
+'<div class="define"><h4>Disk</h4><p>The physical storage device inside a computer that holds data permanently \u2014 files, programs, the operating system \u2014 even when the power is off. Sometimes called a hard drive or storage drive.</p></div>'
+'<p class="body">A <span class="k">disk image</span> is a complete copy of a disk\u2019s raw data, saved as a single file \u2014 useful for forensics because investigators can examine it without touching the original disk. A disk image is, at its core, just a huge sequence of numbers. But that sequence has an invisible structure to it, and specialized forensic tools exist to make sense of that structure rather than requiring a human to decode it by hand.</p>'
+'<div class="define"><h4>Disk image</h4><p>A complete, file-based copy of everything stored on a disk \u2014 used so investigators can analyze the data safely without modifying the original.</p></div>'
+'<p class="body">One well-known toolkit for this is <span class="k">The Sleuth Kit</span>, a collection of command-line tools, each one operating at a specific layer of the disk\u2019s structure. Understanding these layers is more useful at this stage than memorizing exact commands \u2014 think of it as understanding the <i>shape</i> of the problem.</p>'
+'<div class="card"><h3>The four layers (from lowest-level to most familiar)</h3>'
+'<div class="cmd-row"><code>Media</code><span>the lowest level. Tools here (prefixed <code class="inl">mm</code>) read the disk\u2019s overall partition table \u2014 essentially \u201cwhat regions does this disk divide into?\u201d \u2014 without looking inside any of them</span></div>'
+'<div class="cmd-row"><code>Block</code><span>the disk broken into equal-sized chunks called blocks. Tools here are prefixed <code class="inl">blk</code>. A single file is usually made of several blocks</span></div>'
+'<div class="cmd-row"><code>Inode</code><span>the bookkeeping layer. Tools here are prefixed <code class="inl">i</code>. Think of inodes like a book\u2019s table of contents: each inode is like a chapter entry that points to the blocks (pages) making up one file</span></div>'
+'<div class="cmd-row"><code>Filename</code><span>the layer you\u2019d recognize from everyday use, since this is what filenames and folder listings come from. Tools here are prefixed <code class="inl">f</code></span></div></div>'
+'<p class="body">This layered design means a forensic analyst can start broad (what partitions exist?) and progressively zoom in (what files exist within a partition? what blocks make up a specific file?) using a different specialized tool at each step, rather than one tool trying to do everything at once.</p>',
[
  {q:"What is a disk image?",opts:["A compressed backup that only stores deleted files","A complete, file-based copy of everything on a disk, used to analyze it safely","A photograph of the physical hard drive"],a:1,ex:"A disk image captures the entire raw contents of a disk as a single file, so investigators can examine it without risking changes to the original evidence."},
  {q:"In the Sleuth Kit\u2019s layer model, which layer is responsible for showing the disk\u2019s overall partition table?",opts:["The filename layer","The inode layer","The media layer"],a:2,ex:"The media layer is the lowest level and deals with the disk\u2019s overall structure (partitions), without looking inside any of them. Its tools are prefixed mm."},
  {q:"Which analogy best describes the role of the inode layer?",opts:["A book\u2019s table of contents, pointing to the pages (blocks) that make up each chapter (file)","A library\u2019s front door, granting or denying entry","A photocopier, duplicating files exactly"],a:0,ex:"Inodes act like bookkeeping entries \u2014 each one points to the blocks of data that together make up one file, similar to how a table of contents points to specific pages."}
]);
INIT.disklayers=()=>mountMCQ("disklayers");

/* ===================== STAGE 5 — CAPTURING AND UNDERSTANDING NETWORK TRAFFIC ===================== */
LESSONS.packets=()=>mcqStage("packets",
'<div class="eyebrow">Stage 5 \u00b7 disk & network</div><h2 class="lesson">Capturing and understanding network traffic</h2>'
+'<p class="lede">Network forensics examines captured packets to reconstruct what happened during a network conversation \u2014 and that starts with understanding how networks are layered.</p>'
+'<p class="body">Another major branch of forensics is <span class="k">packet analysis</span> (also called network forensics): examining captured network traffic to understand what happened during a conversation between computers. This typically uses a tool like <span class="k">Wireshark</span>, which displays captured packets and lets an analyst filter through them.</p>'
+'<div class="define"><h4>Packet</h4><p>A small chunk of data sent across a network, along with information about where it\u2019s going and what it contains. A single conversation between two computers is usually made up of many packets.</p></div>'
+'<p class="body">Real packet captures can contain anywhere from a handful to tens of thousands of packets. Because of this, packet analysis is mostly about <span class="k">filtering</span> \u2014 narrowing down a huge pile of packets to the small number that actually matter \u2014 rather than reading every single one by hand. An analyst typically filters out known \u201cnoise\u201d (background traffic that\u2019s expected and uninteresting) so that anything unusual stands out more easily.</p>'
+'<p class="body">To understand what you\u2019re filtering, it helps to know that networks are organized into <span class="k">layers</span>, each with a distinct responsibility. This is a similar idea to the disk layers in the previous stage: each layer handles one job, so that the others don\u2019t need to worry about it.</p>'
+'<div class="card"><h3>Network layers (top to bottom)</h3>'
+'<div class="cmd-row"><code>Application</code><span>handles data exchange between applications. HTTP (used to load web pages) lives here</span></div>'
+'<div class="cmd-row"><code>Transport</code><span>manages multiple connections on the same device and handles reliability. Uses <b>TCP</b>, which guarantees nothing gets lost (resending anything missing) \u2014 used when accuracy matters, like loading a web page; or <b>UDP</b>, which is faster but doesn\u2019t resend lost data \u2014 used when speed matters more than perfection, like a voice call</span></div>'
+'<div class="cmd-row"><code>Network</code><span>assigns each device an <b>IP address</b> and handles routing data between networks</span></div>'
+'<div class="cmd-row"><code>Data link</code><span>handles communication between directly-connected devices (e.g. your computer and your router) over Wi-Fi or Ethernet, using a hardware identifier called a <b>MAC address</b></span></div>'
+'<div class="cmd-row"><code>Physical</code><span>the actual electrical signals or radio waves carrying the bits</span></div></div>'
+'<div class="define"><h4>TCP vs UDP</h4><p>TCP prioritizes reliability \u2014 if data is lost, it gets resent, so everything eventually arrives intact (good for web pages, files). UDP prioritizes speed \u2014 lost data is simply not resent, which is fine for things like voice or video calls where a tiny gap matters less than a delay.</p></div>'
+'<p class="body">A useful forensic habit: if a captured packet looks different from all the others around it \u2014 an unusual protocol, an odd flag, a connection that stands out \u2014 that difference is often worth investigating further.</p>',
[
  {q:"Why is filtering such a central part of packet analysis?",opts:["Real captures often contain thousands of packets, and filtering narrows them down to what\u2019s actually relevant","Filtering permanently deletes unwanted packets from the network","Filtering is only used to make the display look nicer, not to aid analysis"],a:0,ex:"With potentially huge numbers of captured packets, manually inspecting each one isn\u2019t practical. Filtering narrows the focus to packets worth a closer look."},
  {q:"What\u2019s the key difference between TCP and UDP?",opts:["TCP is used only for video calls; UDP is used only for web pages","TCP and UDP are two names for the exact same protocol","TCP guarantees delivery by resending lost data; UDP is faster but doesn\u2019t resend lost data"],a:2,ex:"TCP trades some speed for reliability (resending anything missing), while UDP trades reliability for speed, which suits real-time uses like voice or video."},
  {q:"Which network layer is responsible for assigning a device its IP address?",opts:["The application layer","The network layer","The physical layer"],a:1,ex:"The network layer handles IP addressing and routing data between networks. The application layer deals with app-level data (like HTTP), and the physical layer deals with raw electrical/radio signals."}
]);
INIT.packets=()=>mountMCQ("packets");
